[Definition]
# Matches structured pyCluster telnet scanner/auth-abuse failures written to
# /var/log/pycluster/authfail.log. This is intentionally narrower and more
# aggressive than the general core-auth jail.
failregex = ^.*AUTHFAIL channel=telnet ip=<HOST> call=[^ ]+ reason=(?:invalid_callsign|registration_request_required|telnet_login_not_allowed)$

ignoreregex =
